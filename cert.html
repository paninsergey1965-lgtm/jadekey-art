<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JadeKey — Certificate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ── SCREEN STYLES ─────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:   #f5f0e6;
  --ink:  #1a1714;
  --gold: #9a7d4e;
  --red:  #8b2218;
  --mid:  #6b5f4e;
  --pale: #ece6d8;
  --border: rgba(154,125,78,0.30);
}

body {
  background: #d8d0c0;
  font-family: 'EB Garamond', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 0 64px;
  min-height: 100vh;
  color: var(--ink);
  overflow-x: hidden;
}

/* Print button — screen only */
.print-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  align-items: center;
}
.print-btn {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  padding: 10px 24px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  cursor: pointer;
  transition: opacity .2s;
}
.print-btn:hover { opacity: .75; }
.back-link {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: .15em;
  color: var(--mid);
  text-decoration: none;
}
.back-link:hover { color: var(--ink); }

/* ── A4 SHEET ──────────────────────────────────────────── */
.sheet {
  width: 210mm;
  height: 297mm;
  overflow: hidden;
  background: var(--bg);
  position: relative;
  padding: 10mm 14mm 10mm;
  display: flex;
  flex-direction: column;
  gap: 0;

  /* subtle grain */
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E"),
    linear-gradient(180deg, #f5f0e6 0%, #f0eadc 100%);
}

/* corner ornaments */
.sheet::before, .sheet::after,
.sheet .corner-br, .sheet .corner-bl {
  content: '';
  position: absolute;
  width: 14mm; height: 14mm;
  border-color: var(--gold);
  border-style: solid;
  opacity: .55;
}
.sheet::before { top: 8mm; left: 8mm; border-width: 1px 0 0 1px; }
.sheet::after  { top: 8mm; right: 8mm; border-width: 1px 1px 0 0; }
.sheet .corner-br { bottom: 8mm; right: 8mm; border-width: 0 1px 1px 0; }
.sheet .corner-bl { bottom: 8mm; left: 8mm; border-width: 0 0 1px 1px; }

/* ── HEADER ────────────────────────────────────────────── */
.cert-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 3mm;
  border-bottom: 1.5px solid var(--gold);
  margin-bottom: 4mm;
}
.cert-logo {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  letter-spacing: .35em;
  color: var(--ink);
}
.cert-logo em { color: var(--red); font-style: normal; }
.cert-header-right {
  text-align: right;
}
.cert-doc-type {
  font-family: 'Space Mono', monospace;
  font-size: 7.5px;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--gold);
  line-height: 1.8;
}

/* ── MAIN CONTENT ROW ──────────────────────────────────── */
.cert-main {
  display: grid;
  grid-template-columns: 48mm 1fr 30mm;
  gap: 5mm;
  margin-bottom: 4mm;
  align-items: start;
}

/* artwork photo */
.cert-photo {
  width: 48mm;
  height: 58mm;
  object-fit: cover;
  display: block;
  border: 1px solid var(--border);
  filter: sepia(8%) contrast(1.04);
}
.cert-photo-ph {
  width: 48mm;
  height: 58mm;
  background: rgba(154,125,78,.08);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: var(--gold);
  letter-spacing: .15em;
}

/* artwork info */
.cert-info {}
.cert-title {
  font-size: 20px;
  font-weight: 400;
  font-style: italic;
  line-height: 1.1;
  margin-bottom: 1mm;
  color: var(--ink);
}
.cert-title-zh {
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 3mm;
  font-style: normal;
}
.cert-divider {
  width: 28px;
  height: 1px;
  background: var(--gold);
  margin-bottom: 3mm;
}
.cert-row {
  display: flex;
  gap: 5mm;
  margin-bottom: 1.8mm;
  align-items: baseline;
}
.cert-label {
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--gold);
  flex-shrink: 0;
  width: 22mm;
}
.cert-val {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.4;
}

/* QR code */
.cert-qr {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2mm;
}
.cert-qr-label {
  font-family: 'Space Mono', monospace;
  font-size: 6.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  text-align: center;
}
#certQR canvas,
#certQR img {
  width: 28mm !important;
  height: 28mm !important;
}
.cert-qr-id {
  font-family: 'Space Mono', monospace;
  font-size: 6.5px;
  color: var(--mid);
  letter-spacing: .08em;
  text-align: center;
}

/* ── BLOCKCHAIN STRIP ──────────────────────────────────── */
.cert-chain {
  border: 1px solid var(--border);
  background: rgba(154,125,78,.04);
  padding: 2.5mm 5mm;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3.5mm;
}
.cert-chain-label {
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
}
.cert-chain-val {
  font-family: 'Space Mono', monospace;
  font-size: 8.5px;
  color: var(--mid);
  letter-spacing: .08em;
}

/* ── AGATE DESCRIPTION ─────────────────────────────────── */
.cert-puf {
  font-size: 10.5px;
  line-height: 1.55;
  color: rgba(26,23,20,.65);
  font-style: italic;
  border-left: 2px solid rgba(154,125,78,.35);
  padding-left: 4mm;
  margin-bottom: 4mm;
}

/* ── SIGNATURE BLOCK ───────────────────────────────────── */
.cert-sig-section {
  border-top: 1px solid var(--border);
  padding-top: 3.5mm;
  margin-bottom: 3mm;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6mm;
}
.cert-sig-col {}
.cert-sig-label {
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 5mm;
  display: block;
}
.cert-sig-line {
  border-bottom: 1px solid rgba(26,23,20,.25);
  margin-bottom: 1.5mm;
  height: 5.5mm;
}
.cert-sig-sub {
  font-size: 8.5px;
  color: var(--mid);
  font-style: italic;
}

/* Seal placeholder */
.cert-seal-col {
  display: flex;
  flex-direction: column;
}
.cert-seal-box {
  width: 26mm;
  height: 26mm;
  border: 1px dashed rgba(154,125,78,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1mm;
  margin-left: auto;
}
.cert-seal-box span {
  font-family: 'Space Mono', monospace;
  font-size: 6.5px;
  color: rgba(154,125,78,.45);
  letter-spacing: .1em;
  text-align: center;
}

/* ── FOOTER ────────────────────────────────────────────── */
.cert-footer {
  margin-top: auto;
  border-top: 1px solid var(--border);
  padding-top: 3.5mm;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.cert-footer-note {
  font-size: 9px;
  color: rgba(26,23,20,.45);
  line-height: 1.6;
  max-width: 100mm;
  font-style: italic;
}
.cert-footer-logo {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: .3em;
  color: var(--gold);
  text-align: right;
  line-height: 1.7;
}
.cert-footer-logo em { color: var(--red); font-style: normal; }
.cert-footer-logo small {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: .15em;
  color: var(--mid);
  font-style: normal;
}

/* ── LOADING / ERROR ───────────────────────────────────── */
.cert-loading {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: .2em;
  text-align: center;
  padding: 40mm 0;
}

/* ── MOBILE SCALE ──────────────────────────────────────── */
@media (max-width: 220mm) {
  .sheet {
    transform-origin: top center;
    transform: scale(var(--sheet-scale, 1));
    margin-bottom: calc((297mm * var(--sheet-scale, 1)) - 297mm);
  }
}

/* ── PRINT ─────────────────────────────────────────────── */
@media print {
  body { background: #fff; padding: 0; }
  .print-bar { display: none; }
  .sheet {
    width: 210mm;
    min-height: 297mm;
    padding: 14mm 16mm 14mm;
    box-shadow: none;
  }
}
</style>
</head>
<body>

<div class="print-bar">
  <a class="back-link" id="backLink" href="/">← Passport</a>
  <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
</div>

<div class="sheet" id="sheet">
  <div class="corner-br"></div>
  <div class="corner-bl"></div>
  <div class="cert-loading" id="certLoading">Loading…</div>
</div>

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/paninsergey1965-lgtm/jadekey-art/main';
const TON_REGISTRY = 'UQCSHtvmlLI8uWI0SpP0Nuwbf5Yth4MrW9sPhwW7jnyBEKCu';

// Mobile: scale sheet to fit screen width
function applyMobileScale() {
  const sheet = document.querySelector('.sheet');
  const mmToPx = 3.7795;
  const sheetPx = 210 * mmToPx;
  const vw = window.innerWidth;
  if (vw < sheetPx) {
    const scale = vw / sheetPx;
    sheet.style.transform = `scale(${scale})`;
    sheet.style.transformOrigin = 'top center';
    sheet.style.marginBottom = `calc(${297 * mmToPx * scale}px - 297mm)`;
    document.body.style.paddingLeft = '0';
    document.body.style.paddingRight = '0';
  }
}
applyMobileScale();
window.addEventListener('resize', applyMobileScale);

// Detect JK id from URL: /cert/JK-000001 or ?id=JK-000001 (local test)
const pathParts = location.pathname.split('/');
const params = new URLSearchParams(location.search);
const jkId = (pathParts[2] || params.get('id') || '').toUpperCase();

async function loadDB() {
  const r = await fetch(GITHUB_RAW + '/works.json?t=' + Date.now());
  return r.json();
}

function shortTon(addr) {
  return addr.slice(0, 10) + '…' + addr.slice(-4);
}

function buildCert(id, w) {
  const RAW = GITHUB_RAW;
  const photoUrl   = w.photo       ? RAW + '/' + w.photo       : '';
  const passportUrl = 'https://jadekey.art/' + id;

  // back link
  document.getElementById('backLink').href = '/' + id;

  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <div class="corner-br"></div>
    <div class="corner-bl"></div>

    <!-- HEADER -->
    <div class="cert-header">
      <div class="cert-logo">JADE<em>KEY</em></div>
      <div class="cert-header-right">
        <div class="cert-doc-type">Certificate of Authenticity</div>
        <div class="cert-doc-type" style="color:var(--mid)">Сертификат подлинности</div>
      </div>
    </div>

    <!-- MAIN ROW: photo | info | QR -->
    <div class="cert-main">

      <!-- Photo -->
      <div>
        ${photoUrl
          ? `<img class="cert-photo" src="${photoUrl}" alt="${w.title}">`
          : `<div class="cert-photo-ph">NO IMAGE</div>`}
      </div>

      <!-- Info -->
      <div class="cert-info">
        <div class="cert-title">${w.title || '—'}</div>
        <div class="cert-title-zh">${w.title_zh || ''}</div>
        <div class="cert-divider"></div>

        <div class="cert-row">
          <div class="cert-label">Художник</div>
          <div class="cert-val">${w.artist_full || w.artist || '—'} · ${w.artist_zh || ''}<br>
            <span style="font-size:11px;color:var(--mid)">${w.artist_born || ''}–${w.artist_died || ''}</span>
          </div>
        </div>
        <div class="cert-row">
          <div class="cert-label">Техника</div>
          <div class="cert-val">${w.medium || '—'} · ${w.year || ''}</div>
        </div>
        <div class="cert-row">
          <div class="cert-label">Владелец</div>
          <div class="cert-val">${w.owner || '—'} · ${w.owner_city || ''}</div>
        </div>
        <div class="cert-row">
          <div class="cert-label">Зарегистр.</div>
          <div class="cert-val">${w.registered || '—'}</div>
        </div>
        <div class="cert-row" style="margin-top:2mm">
          <div class="cert-label">JadeKey ID</div>
          <div class="cert-val" style="font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em">${id}</div>
        </div>
      </div>

      <!-- QR -->
      <div class="cert-qr">
        <div class="cert-qr-label">Цифровой<br>паспорт</div>
        <div id="certQR"></div>
        <div class="cert-qr-id">${id}</div>
      </div>
    </div>

    <!-- BLOCKCHAIN -->
    <div class="cert-chain">
      <div>
        <div class="cert-chain-label">Блокчейн TON · Реестр JadeKey</div>
        <div class="cert-chain-val" style="margin-top:1.5mm">${shortTon(TON_REGISTRY)}</div>
      </div>
      <div class="cert-chain-val" style="text-align:right;font-size:7.5px;color:var(--gold)">
        JadeKey:${id}:${(w.title||'').replace(/\s+/g,'-')}:<br>
        ${(w.artist||'').replace(/\s+/g,'-')}:${(w.owner||'').replace(/\s+/g,'-')}:${w.year||''}
      </div>
    </div>

    <!-- PUF description -->
    <div class="cert-puf">
      Физический ключ аутентификации — уникальный срез агата, внутренняя микроструктура которого,
      формировавшаяся миллионы лет, навсегда связана с этим произведением и не может быть воспроизведена.
    </div>

    <!-- SIGNATURE BLOCK -->
    <div class="cert-sig-section">
      <div class="cert-sig-col">
        <span class="cert-sig-label">Продавец / Галерея · Seller / Gallery</span>
        <div class="cert-sig-line"></div>
        <div class="cert-sig-sub">Название / Name</div>

        <div style="margin-top:5mm"></div>
        <span class="cert-sig-label">Дата продажи · Date of sale</span>
        <div class="cert-sig-line"></div>
        <div class="cert-sig-sub">&nbsp;</div>

        <div style="margin-top:5mm"></div>
        <span class="cert-sig-label">Подпись · Signature</span>
        <div class="cert-sig-line"></div>
        <div class="cert-sig-sub">Уполномоченное лицо / Authorized person</div>
      </div>

      <div class="cert-sig-col" style="display:flex;flex-direction:column;align-items:flex-end">
        <span class="cert-sig-label" style="align-self:flex-start">Печать · Seal</span>
        <div class="cert-seal-box">
          <span>ПЕЧАТЬ</span>
          <span>ПРОДАВЦА</span>
          <span style="margin-top:1mm;opacity:.6">4 × 4 cm</span>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="cert-footer">
      <div class="cert-footer-note">
        JadeKey регистрирует физический идентификатор объекта на основе уникальной микроструктуры минерала.<br>
        Подлинность произведения как такового подтверждается продавцом или галереей.
      </div>
      <div class="cert-footer-logo">
        JADE<em>KEY</em>
        <small>jadekey.art · ${new Date().getFullYear()}</small>
      </div>
    </div>
  `;

  // Generate QR
  new QRCode(document.getElementById('certQR'), {
    text: passportUrl,
    width: 106, height: 106,
    colorDark: '#1a1714',
    colorLight: '#f5f0e6',
    correctLevel: QRCode.CorrectLevel.M
  });
}

async function init() {
  if (!jkId || !jkId.startsWith('JK-')) {
    document.getElementById('certLoading').textContent = 'Invalid ID';
    return;
  }
  try {
    const db = await loadDB();
    const works = db.works || db;
    const w = works[jkId];
    if (!w) {
      document.getElementById('certLoading').textContent = jkId + ' not found';
      return;
    }
    buildCert(jkId, w);
    document.title = `JadeKey — ${w.title || jkId} · Certificate`;
  } catch(e) {
    document.getElementById('certLoading').textContent = 'Error: ' + e.message;
  }
}

init();
</script>
</body>
</html>

  align-items: start;
}

/* artwork photo */
.cert-photo {
  width: 52mm;
  height: 66mm;
  object-fit: cover;
  display: block;
  border: 1px solid var(--border);
  filter: sepia(8%) contrast(1.04);
}
.cert-photo-ph {
  width: 52mm;
  height: 66mm;
  background: rgba(154,125,78,.08);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: var(--gold);
  letter-spacing: .15em;
}

/* artwork info */
.cert-info {}
.cert-title {
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
  line-height: 1.15;
  margin-bottom: 1.5mm;
  color: var(--ink);
}
.cert-title-zh {
  font-size: 13px;
  color: var(--gold);
  margin-bottom: 5mm;
  font-style: normal;
}
.cert-divider {
  width: 28px;
  height: 1px;
  background: var(--gold);
  margin-bottom: 5mm;
}
.cert-row {
  display: flex;
  gap: 6mm;
  margin-bottom: 2.5mm;
  align-items: baseline;
}
.cert-label {
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--gold);
  flex-shrink: 0;
  width: 22mm;
}
.cert-val {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.4;
}

/* QR code */
.cert-qr {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2mm;
}
.cert-qr-label {
  font-family: 'Space Mono', monospace;
  font-size: 6.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  text-align: center;
}
#certQR canvas,
#certQR img {
  width: 28mm !important;
  height: 28mm !important;
}
.cert-qr-id {
  font-family: 'Space Mono', monospace;
  font-size: 6.5px;
  color: var(--mid);
  letter-spacing: .08em;
  text-align: center;
}

/* ── BLOCKCHAIN STRIP ──────────────────────────────────── */
.cert-chain {
  border: 1px solid var(--border);
  background: rgba(154,125,78,.04);
  padding: 3mm 5mm;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5mm;
}
.cert-chain-label {
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
}
.cert-chain-val {
  font-family: 'Space Mono', monospace;
  font-size: 8.5px;
  color: var(--mid);
  letter-spacing: .08em;
}

/* ── AGATE DESCRIPTION ─────────────────────────────────── */
.cert-puf {
  font-size: 11px;
  line-height: 1.65;
  color: rgba(26,23,20,.65);
  font-style: italic;
  border-left: 2px solid rgba(154,125,78,.35);
  padding-left: 4mm;
  margin-bottom: 6mm;
}

/* ── SIGNATURE BLOCK ───────────────────────────────────── */
.cert-sig-section {
  border-top: 1px solid var(--border);
  padding-top: 5mm;
  margin-bottom: 5mm;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6mm;
}
.cert-sig-col {}
.cert-sig-label {
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 7mm;
  display: block;
}
.cert-sig-line {
  border-bottom: 1px solid rgba(26,23,20,.25);
  margin-bottom: 2mm;
  height: 7mm;
}
.cert-sig-sub {
  font-size: 9px;
  color: var(--mid);
  font-style: italic;
}

/* Seal placeholder */
.cert-seal-col {
  display: flex;
  flex-direction: column;
}
.cert-seal-box {
  width: 28mm;
  height: 28mm;
  border: 1px dashed rgba(154,125,78,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1mm;
  margin-left: auto;
}
.cert-seal-box span {
  font-family: 'Space Mono', monospace;
  font-size: 6.5px;
  color: rgba(154,125,78,.45);
  letter-spacing: .1em;
  text-align: center;
}

/* ── FOOTER ────────────────────────────────────────────── */
.cert-footer {
  margin-top: auto;
  border-top: 1px solid var(--border);
  padding-top: 3.5mm;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.cert-footer-note {
  font-size: 9px;
  color: rgba(26,23,20,.45);
  line-height: 1.6;
  max-width: 100mm;
  font-style: italic;
}
.cert-footer-logo {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: .3em;
  color: var(--gold);
  text-align: right;
  line-height: 1.7;
}
.cert-footer-logo em { color: var(--red); font-style: normal; }
.cert-footer-logo small {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  letter-spacing: .15em;
  color: var(--mid);
  font-style: normal;
}

/* ── LOADING / ERROR ───────────────────────────────────── */
.cert-loading {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: .2em;
  text-align: center;
  padding: 40mm 0;
}

/* ── PRINT ─────────────────────────────────────────────── */
@media print {
  body { background: #fff; padding: 0; }
  .print-bar { display: none; }
  .sheet {
    width: 210mm;
    min-height: 297mm;
    padding: 14mm 16mm 14mm;
    box-shadow: none;
  }
}
</style>
</head>
<body>

<div class="print-bar">
  <a class="back-link" id="backLink" href="/">← Passport</a>
  <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
</div>

<div class="sheet" id="sheet">
  <div class="corner-br"></div>
  <div class="corner-bl"></div>
  <div class="cert-loading" id="certLoading">Loading…</div>
</div>

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/paninsergey1965-lgtm/jadekey-art/main';
const TON_REGISTRY = 'UQCSHtvmlLI8uWI0SpP0Nuwbf5Yth4MrW9sPhwW7jnyBEKCu';

// Detect JK id from URL: /cert/JK-000001 or ?id=JK-000001 (local test)
const pathParts = location.pathname.split('/');
const params = new URLSearchParams(location.search);
const jkId = (pathParts[2] || params.get('id') || '').toUpperCase();

async function loadDB() {
  const r = await fetch(GITHUB_RAW + '/works.json?t=' + Date.now());
  return r.json();
}

function shortTon(addr) {
  return addr.slice(0, 10) + '…' + addr.slice(-4);
}

function buildCert(id, w) {
  const RAW = GITHUB_RAW;
  const photoUrl   = w.photo       ? RAW + '/' + w.photo       : '';
  const passportUrl = 'https://jadekey.art/' + id;

  // back link
  document.getElementById('backLink').href = '/' + id;

  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <div class="corner-br"></div>
    <div class="corner-bl"></div>

    <!-- HEADER -->
    <div class="cert-header">
      <div class="cert-logo">JADE<em>KEY</em></div>
      <div class="cert-header-right">
        <div class="cert-doc-type">Certificate of Authenticity</div>
        <div class="cert-doc-type" style="color:var(--mid)">Сертификат подлинности</div>
      </div>
    </div>

    <!-- MAIN ROW: photo | info | QR -->
    <div class="cert-main">

      <!-- Photo -->
      <div>
        ${photoUrl
          ? `<img class="cert-photo" src="${photoUrl}" alt="${w.title}">`
          : `<div class="cert-photo-ph">NO IMAGE</div>`}
      </div>

      <!-- Info -->
      <div class="cert-info">
        <div class="cert-title">${w.title || '—'}</div>
        <div class="cert-title-zh">${w.title_zh || ''}</div>
        <div class="cert-divider"></div>

        <div class="cert-row">
          <div class="cert-label">Художник</div>
          <div class="cert-val">${w.artist_full || w.artist || '—'} · ${w.artist_zh || ''}<br>
            <span style="font-size:11px;color:var(--mid)">${w.artist_born || ''}–${w.artist_died || ''}</span>
          </div>
        </div>
        <div class="cert-row">
          <div class="cert-label">Техника</div>
          <div class="cert-val">${w.medium || '—'} · ${w.year || ''}</div>
        </div>
        <div class="cert-row">
          <div class="cert-label">Владелец</div>
          <div class="cert-val">${w.owner || '—'} · ${w.owner_city || ''}</div>
        </div>
        <div class="cert-row">
          <div class="cert-label">Зарегистр.</div>
          <div class="cert-val">${w.registered || '—'}</div>
        </div>
        <div class="cert-row" style="margin-top:2mm">
          <div class="cert-label">JadeKey ID</div>
          <div class="cert-val" style="font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em">${id}</div>
        </div>
      </div>

      <!-- QR -->
      <div class="cert-qr">
        <div class="cert-qr-label">Цифровой<br>паспорт</div>
        <div id="certQR"></div>
        <div class="cert-qr-id">${id}</div>
      </div>
    </div>

    <!-- BLOCKCHAIN -->
    <div class="cert-chain">
      <div>
        <div class="cert-chain-label">Блокчейн TON · Реестр JadeKey</div>
        <div class="cert-chain-val" style="margin-top:1.5mm">${shortTon(TON_REGISTRY)}</div>
      </div>
      <div class="cert-chain-val" style="text-align:right;font-size:7.5px;color:var(--gold)">
        JadeKey:${id}:${(w.title||'').replace(/\s+/g,'-')}:<br>
        ${(w.artist||'').replace(/\s+/g,'-')}:${(w.owner||'').replace(/\s+/g,'-')}:${w.year||''}
      </div>
    </div>

    <!-- PUF description -->
    <div class="cert-puf">
      Физический ключ аутентификации — уникальный срез агата, внутренняя микроструктура которого,
      формировавшаяся миллионы лет, навсегда связана с этим произведением и не может быть воспроизведена.
    </div>

    <!-- SIGNATURE BLOCK -->
    <div class="cert-sig-section">
      <div class="cert-sig-col">
        <span class="cert-sig-label">Продавец / Галерея · Seller / Gallery</span>
        <div class="cert-sig-line"></div>
        <div class="cert-sig-sub">Название / Name</div>

        <div style="margin-top:5mm"></div>
        <span class="cert-sig-label">Дата продажи · Date of sale</span>
        <div class="cert-sig-line"></div>
        <div class="cert-sig-sub">&nbsp;</div>

        <div style="margin-top:5mm"></div>
        <span class="cert-sig-label">Подпись · Signature</span>
        <div class="cert-sig-line"></div>
        <div class="cert-sig-sub">Уполномоченное лицо / Authorized person</div>
      </div>

      <div class="cert-sig-col" style="display:flex;flex-direction:column;align-items:flex-end">
        <span class="cert-sig-label" style="align-self:flex-start">Печать · Seal</span>
        <div class="cert-seal-box">
          <span>ПЕЧАТЬ</span>
          <span>ПРОДАВЦА</span>
          <span style="margin-top:1mm;opacity:.6">4 × 4 cm</span>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="cert-footer">
      <div class="cert-footer-note">
        JadeKey регистрирует физический идентификатор объекта на основе уникальной микроструктуры минерала.<br>
        Подлинность произведения как такового подтверждается продавцом или галереей.
      </div>
      <div class="cert-footer-logo">
        JADE<em>KEY</em>
        <small>jadekey.art · ${new Date().getFullYear()}</small>
      </div>
    </div>
  `;

  // Generate QR
  new QRCode(document.getElementById('certQR'), {
    text: passportUrl,
    width: 106, height: 106,
    colorDark: '#1a1714',
    colorLight: '#f5f0e6',
    correctLevel: QRCode.CorrectLevel.M
  });
}

async function init() {
  if (!jkId || !jkId.startsWith('JK-')) {
    document.getElementById('certLoading').textContent = 'Invalid ID';
    return;
  }
  try {
    const db = await loadDB();
    const works = db.works || db;
    const w = works[jkId];
    if (!w) {
      document.getElementById('certLoading').textContent = jkId + ' not found';
      return;
    }
    buildCert(jkId, w);
  } catch(e) {
    document.getElementById('certLoading').textContent = 'Error: ' + e.message;
  }
}

init();
</script>
</body>
</html>
