<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JadeKey Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0a08;--paper:#f4efe6;--stone:#b89a6e;--red:#b83225;--deep:#141410;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--deep);color:var(--paper);font-family:'Cormorant Garamond',serif;min-height:100vh;}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;}
.login-logo{font-size:14px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:64px;}
.login-logo em{color:var(--red);font-style:normal;}
.login-box{width:100%;max-width:400px;}
.login-box h2{font-size:28px;font-weight:300;margin-bottom:8px;}
.login-box p{font-family:'Space Mono',monospace;font-size:10px;color:rgba(244,239,230,0.4);letter-spacing:0.1em;margin-bottom:40px;}
.field{margin-bottom:20px;}
.field label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--stone);display:block;margin-bottom:8px;}
.field input{width:100%;background:rgba(244,239,230,0.05);border:1px solid rgba(184,154,110,0.2);padding:14px 16px;color:var(--paper);font-family:'Space Mono',monospace;font-size:13px;outline:none;-webkit-appearance:none;border-radius:0;}
.field input:focus{border-color:var(--stone);}
.btn-login{width:100%;padding:16px;background:var(--stone);color:var(--ink);border:none;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;margin-top:8px;-webkit-appearance:none;border-radius:0;}
.err{font-family:'Space Mono',monospace;font-size:11px;color:var(--red);margin-top:12px;display:none;text-align:center;}
#admin-panel{display:none;}
.admin-nav{display:flex;justify-content:space-between;align-items:center;padding:20px 32px;border-bottom:1px solid rgba(184,154,110,0.1);background:rgba(10,10,8,0.8);}
.a-logo{font-size:13px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;}
.a-logo em{color:var(--red);font-style:normal;}
.btn-out{font-family:'Space Mono',monospace;font-size:10px;color:rgba(244,239,230,0.4);background:none;border:1px solid rgba(244,239,230,0.1);padding:8px 16px;cursor:pointer;border-radius:0;}
.admin-body{padding:40px 32px;max-width:900px;}
.admin-body h2{font-size:28px;font-weight:300;margin-bottom:6px;}
.sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--stone);letter-spacing:0.1em;margin-bottom:40px;}
.wcard{background:rgba(244,239,230,0.03);border:1px solid rgba(184,154,110,0.1);padding:24px;margin-bottom:2px;display:flex;gap:20px;align-items:center;}
.wthumb{width:64px;height:64px;object-fit:cover;flex-shrink:0;}
.winfo{flex:1;}
.wid{font-family:'Space Mono',monospace;font-size:9px;color:var(--stone);letter-spacing:0.15em;margin-bottom:4px;}
.wtitle{font-size:18px;font-weight:300;margin-bottom:3px;}
.wmeta{font-family:'Space Mono',monospace;font-size:9px;color:rgba(244,239,230,0.3);}
.wact{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0;}
.badge{font-family:'Space Mono',monospace;font-size:9px;padding:4px 10px;border-radius:2px;}
.badge.pub{background:rgba(184,154,110,0.15);color:var(--stone);border:1px solid rgba(184,154,110,0.3);}
.badge.prv{background:rgba(244,239,230,0.03);color:rgba(244,239,230,0.3);border:1px solid rgba(244,239,230,0.08);}
.tog-row{display:flex;align-items:center;gap:10px;}
.tog-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--stone);}
.tog{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-sl{position:absolute;inset:0;background:rgba(244,239,230,0.08);border:1px solid rgba(184,154,110,0.2);border-radius:22px;transition:0.3s;}
.tog-sl::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:rgba(184,154,110,0.5);border-radius:50%;transition:0.3s;}
.tog input:checked + .tog-sl{background:rgba(184,154,110,0.12);border-color:var(--stone);}
.tog input:checked + .tog-sl::before{transform:translateX(18px);background:var(--stone);}
.wlink{font-family:'Space Mono',monospace;font-size:9px;color:rgba(244,239,230,0.25);text-decoration:none;}
.wlink:hover{color:var(--stone);}
.saved{font-family:'Space Mono',monospace;font-size:10px;color:var(--stone);margin-top:24px;display:none;}
.loading{font-family:'Space Mono',monospace;font-size:11px;color:var(--stone);padding:32px 0;letter-spacing:0.2em;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">JADE<em>KEY</em></div>
  <div class="login-box">
    <h2>Admin Panel</h2>
    <p>RESTRICTED ACCESS · JADEKEY.ART</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="f-email" value="paninsergey1965@gmail.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="f-pass" placeholder="Enter password">
    </div>
    <button class="btn-login" id="btn-enter" onclick="doLogin()">ENTER</button>
    <div class="err" id="err-msg">Incorrect password</div>
  </div>
</div>

<div id="admin-panel">
  <div class="admin-nav">
    <div class="a-logo">JADE<em>KEY</em> · Admin</div>
    <button class="btn-out" onclick="doLogout()">Logout</button>
  </div>
  <div class="admin-body">
    <h2>Works Registry</h2>
    <div class="sub" id="wcount">Loading...</div>
    <div id="wlist"><div class="loading">Loading...</div></div>
    <div class="saved" id="saved-msg">✓ Saved</div>
  </div>
</div>

<script>
const ADMIN_EMAIL = 'paninsergey1965@gmail.com';
const PASS_KEY = 'jk_pass';
const SESSION_KEY = 'jk_session';
const GH_REPO = 'paninsergey1965-lgtm/jadekey-art';
const RAW = 'https://raw.githubusercontent.com/' + GH_REPO + '/main';
const GH_API = 'https://api.github.com/repos/' + GH_REPO + '/contents/works.json';

let works = {}, sha = '';

function getToken() { return localStorage.getItem('jk_t') || ''; }

function doLogin() {
  const email = document.getElementById('f-email').value.trim();
  const pass = document.getElementById('f-pass').value;
  const stored = localStorage.getItem(PASS_KEY);

  if (email !== ADMIN_EMAIL) {
    document.getElementById('err-msg').style.display = 'block';
    return;
  }

  if (!stored) {
    if (pass.length < 4) {
      document.getElementById('err-msg').textContent = 'Min 4 characters';
      document.getElementById('err-msg').style.display = 'block';
      return;
    }
    localStorage.setItem(PASS_KEY, pass);
    localStorage.setItem(SESSION_KEY, '1');
    enterPanel();
    return;
  }

  if (pass !== stored) {
    document.getElementById('err-msg').style.display = 'block';
    return;
  }

  localStorage.setItem(SESSION_KEY, '1');
  enterPanel();
}

document.getElementById('f-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

function enterPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  loadWorks();
}

async function loadWorks() {
  try {
    const t = getToken();
    const headers = t ? { 'Authorization': 'Bearer ' + t } : {};
    const res = await fetch(GH_API, { headers });
    const data = await res.json();
    sha = data.sha;
    works = JSON.parse(atob(data.content.replace(/\n/g, '')));
    renderWorks();
  } catch(e) {
    document.getElementById('wlist').innerHTML = '<div class="loading">Error loading</div>';
  }
}

function renderWorks() {
  const keys = Object.keys(works);
  document.getElementById('wcount').textContent = keys.length + ' work' + (keys.length !== 1 ? 's' : '') + ' registered';

  document.getElementById('wlist').innerHTML = keys.map(id => {
    const w = works[id];
    return `<div class="wcard">
      <img class="wthumb" src="${RAW}/${w.photo}" onerror="this.style.display='none'">
      <div class="winfo">
        <div class="wid">${id}</div>
        <div class="wtitle">${w.title}</div>
        <div class="wmeta">${w.artist} · ${w.year} · ${w.owner}</div>
      </div>
      <div class="wact">
        <span class="badge ${w.public?'pub':'prv'}" id="b-${id}">${w.public?'PUBLIC':'PRIVATE'}</span>
        <div class="tog-row">
          <span class="tog-lbl">Public</span>
          <label class="tog">
            <input type="checkbox" ${w.public?'checked':''} onchange="toggle('${id}',this.checked)">
            <span class="tog-sl"></span>
          </label>
        </div>
        <a href="/${id}" target="_blank" class="wlink">↗ passport</a>
      </div>
    </div>`;
  }).join('') || '<div class="loading">No works yet</div>';
}

async function toggle(id, val) {
  works[id].public = val;
  const b = document.getElementById('b-' + id);
  b.textContent = val ? 'PUBLIC' : 'PRIVATE';
  b.className = 'badge ' + (val ? 'pub' : 'prv');

  const t = getToken();
  if (!t) {
    document.getElementById('saved-msg').textContent = '⚠ No GitHub token — changes not saved';
    document.getElementById('saved-msg').style.display = 'block';
    return;
  }

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(works, null, 2))));
  const res = await fetch(GH_API, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'Update visibility', content, sha })
  });
  const data = await res.json();
  if (data.content) {
    sha = data.content.sha;
    const m = document.getElementById('saved-msg');
    m.textContent = '✓ Saved';
    m.style.display = 'block';
    setTimeout(() => m.style.display = 'none', 3000);
  }
}

if (localStorage.getItem(SESSION_KEY)) enterPanel();
</script>
</body>
</html>
