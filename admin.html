<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JadeKey Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0a08;--paper:#f4efe6;--stone:#b89a6e;--red:#b83225;--deep:#141410;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--deep);color:var(--paper);font-family:'Cormorant Garamond',serif;min-height:100vh;}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;}
.login-logo{font-size:14px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:48px;}
.login-logo em{color:var(--red);font-style:normal;}
.login-box{width:100%;max-width:420px;}
.login-box h2{font-size:28px;font-weight:300;margin-bottom:6px;}
.login-box .sub{font-family:'Space Mono',monospace;font-size:10px;color:rgba(244,239,230,0.4);letter-spacing:0.1em;margin-bottom:36px;}
.field{margin-bottom:16px;}
.field label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--stone);display:block;margin-bottom:7px;}
.field input{width:100%;background:rgba(244,239,230,0.05);border:1px solid rgba(184,154,110,0.2);padding:13px 14px;color:var(--paper);font-family:'Space Mono',monospace;font-size:12px;outline:none;-webkit-appearance:none;border-radius:0;}
.field input:focus{border-color:var(--stone);}
.field .hint{font-family:'Space Mono',monospace;font-size:9px;color:rgba(244,239,230,0.25);margin-top:5px;line-height:1.4;}
.btn-login{width:100%;padding:15px;background:var(--stone);color:var(--ink);border:none;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;margin-top:8px;-webkit-appearance:none;border-radius:0;}
.err{font-family:'Space Mono',monospace;font-size:10px;color:var(--red);margin-top:10px;display:none;text-align:center;}
#admin-panel{display:none;}
.admin-nav{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid rgba(184,154,110,0.1);}
.a-logo{font-size:13px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;}
.a-logo em{color:var(--red);font-style:normal;}
.btn-out{font-family:'Space Mono',monospace;font-size:10px;color:rgba(244,239,230,0.4);background:none;border:1px solid rgba(244,239,230,0.1);padding:7px 14px;cursor:pointer;border-radius:0;}
.admin-body{padding:36px 28px;max-width:860px;}
.admin-body h2{font-size:26px;font-weight:300;margin-bottom:4px;}
.sub2{font-family:'Space Mono',monospace;font-size:10px;color:var(--stone);letter-spacing:0.1em;margin-bottom:32px;}
.wcard{background:rgba(244,239,230,0.03);border:1px solid rgba(184,154,110,0.1);padding:20px;margin-bottom:2px;display:flex;gap:16px;align-items:center;}
.wthumb{width:60px;height:60px;object-fit:cover;flex-shrink:0;border-radius:2px;}
.winfo{flex:1;min-width:0;}
.wid{font-family:'Space Mono',monospace;font-size:9px;color:var(--stone);letter-spacing:0.15em;margin-bottom:3px;}
.wtitle{font-size:17px;font-weight:300;margin-bottom:2px;}
.wmeta{font-family:'Space Mono',monospace;font-size:9px;color:rgba(244,239,230,0.3);}
.wact{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0;}
.badge{font-family:'Space Mono',monospace;font-size:9px;padding:3px 9px;}
.badge.pub{background:rgba(184,154,110,0.15);color:var(--stone);border:1px solid rgba(184,154,110,0.3);}
.badge.prv{background:transparent;color:rgba(244,239,230,0.25);border:1px solid rgba(244,239,230,0.08);}
.tog-row{display:flex;align-items:center;gap:8px;}
.tog-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--stone);}
.tog{position:relative;width:38px;height:20px;cursor:pointer;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-sl{position:absolute;inset:0;background:rgba(244,239,230,0.08);border:1px solid rgba(184,154,110,0.2);border-radius:20px;transition:0.3s;}
.tog-sl::before{content:'';position:absolute;height:12px;width:12px;left:3px;bottom:3px;background:rgba(184,154,110,0.5);border-radius:50%;transition:0.3s;}
.tog input:checked + .tog-sl{border-color:var(--stone);}
.tog input:checked + .tog-sl::before{transform:translateX(18px);background:var(--stone);}
.wlink{font-family:'Space Mono',monospace;font-size:9px;color:rgba(244,239,230,0.25);text-decoration:none;}
.wlink:hover{color:var(--stone);}
.btn-ton{font-family:'Space Mono',monospace;font-size:9px;padding:5px 10px;background:rgba(0,136,204,0.12);border:1px solid rgba(0,136,204,0.3);color:#29b6f6;cursor:pointer;white-space:nowrap;border-radius:0;text-decoration:none;display:inline-block;}
.btn-ton:hover{background:rgba(0,136,204,0.25);}
.btn-ton.anchored{background:rgba(0,204,102,0.12);border-color:rgba(0,204,102,0.3);color:#0c6;}
.btn-ton.anchored:hover{background:rgba(0,204,102,0.22);}
.saved{font-family:'Space Mono',monospace;font-size:10px;color:var(--stone);margin-top:20px;display:none;}
.loading-txt{font-family:'Space Mono',monospace;font-size:11px;color:var(--stone);padding:28px 0;letter-spacing:0.15em;}
.token-banner{background:rgba(184,154,110,0.08);border:1px solid rgba(184,154,110,0.2);padding:20px;margin-bottom:24px;}
.token-banner p{font-family:'Space Mono',monospace;font-size:10px;color:var(--stone);margin-bottom:12px;line-height:1.6;}
.token-row{display:flex;gap:8px;}
.token-row input{flex:1;background:rgba(244,239,230,0.05);border:1px solid rgba(184,154,110,0.2);padding:10px 12px;color:var(--paper);font-family:'Space Mono',monospace;font-size:11px;outline:none;border-radius:0;-webkit-appearance:none;}
.token-row button{padding:10px 16px;background:var(--stone);color:var(--ink);border:none;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;white-space:nowrap;border-radius:0;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">JADE<em>KEY</em></div>
  <div class="login-box">
    <h2>Admin Panel</h2>
    <p class="sub">RESTRICTED ACCESS · JADEKEY.ART</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="f-email" value="paninsergey1965@gmail.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="f-pass" placeholder="Enter password (min 4 chars)">
      <div class="hint">First login: set your password. Next time: enter the same password.</div>
    </div>
    <button class="btn-login" onclick="doLogin()">ENTER</button>
    <div class="err" id="err-msg">Incorrect password</div>
  </div>
</div>

<div id="admin-panel">
  <div class="admin-nav">
    <div class="a-logo">JADE<em>KEY</em> · Admin</div>
    <button class="btn-out" onclick="doLogout()">Logout</button>
  </div>
  <div class="admin-body">
    <h2>Works Registry</h2>
    <div class="sub2" id="wcount">Loading...</div>

    <div id="token-banner" class="token-banner" style="display:none">
      <p>Enter GitHub token to enable saving changes:<br>Token is stored locally in your browser only.</p>
      <div class="token-row">
        <input type="password" id="token-input" placeholder="ghp_...">
        <button onclick="saveToken()">Save token</button>
      </div>
    </div>

    <div id="wlist"><div class="loading-txt">Loading...</div></div>
    <div class="saved" id="saved-msg">✓ Saved</div>
  </div>
</div>

<script>
const ADMIN_EMAIL = 'paninsergey1965@gmail.com';
const PASS_KEY = 'jk_pass';
const SESSION_KEY = 'jk_session';
const TOKEN_KEY = 'jk_t';
const GH_REPO = 'paninsergey1965-lgtm/jadekey-art';
const RAW = 'https://raw.githubusercontent.com/' + GH_REPO + '/main';
const GH_API = 'https://api.github.com/repos/' + GH_REPO + '/contents/works.json';
const TON_REGISTRY = 'UQCSHtvmlLI8uWI0SpP0Nuwbf5Yth4MrW9sPhwW7jnyBEKCu';

// db = полный объект {clients:{...}, works:{...}}
// worksDb = db.works = {JK-000001:{...}, ...}
let db = {}, worksDb = {}, sha = '';

function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

function saveToken() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  localStorage.setItem(TOKEN_KEY, t);
  document.getElementById('token-banner').style.display = 'none';
  loadWorks();
}

function doLogin() {
  const email = document.getElementById('f-email').value.trim();
  const pass = document.getElementById('f-pass').value;
  const stored = localStorage.getItem(PASS_KEY);
  const err = document.getElementById('err-msg');
  err.style.display = 'none';
  if (email !== ADMIN_EMAIL) { err.style.display = 'block'; return; }
  if (!stored) {
    if (pass.length < 4) { err.textContent = 'Min 4 characters'; err.style.display = 'block'; return; }
    localStorage.setItem(PASS_KEY, pass);
    localStorage.setItem(SESSION_KEY, '1');
    enterPanel(); return;
  }
  if (pass !== stored) { err.style.display = 'block'; return; }
  localStorage.setItem(SESSION_KEY, '1');
  enterPanel();
}

document.getElementById('f-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

function enterPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  if (!getToken()) {
    document.getElementById('token-banner').style.display = 'block';
    document.getElementById('wcount').textContent = 'Token required to load works';
  } else {
    loadWorks();
  }
}

async function loadWorks() {
  try {
    const res = await fetch(GH_API, {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    });
    const data = await res.json();
    if (!data.sha) throw new Error('no sha');
    sha = data.sha;
    db = JSON.parse(atob(data.content.replace(/\n/g, '')));
    // works.json имеет структуру {clients:{...}, works:{JK-000001:{...}}}
    worksDb = db.works || db;
    renderWorks();
  } catch(e) {
    document.getElementById('wlist').innerHTML = '<div class="loading-txt">Error loading — check token</div>';
    document.getElementById('token-banner').style.display = 'block';
  }
}

function renderWorks() {
  const keys = Object.keys(worksDb);
  document.getElementById('wcount').textContent = keys.length + ' work' + (keys.length !== 1 ? 's' : '') + ' registered';
  document.getElementById('wlist').innerHTML = keys.map(id => {
    const w = worksDb[id];
    const tonAnchored = !!w.ton_tx;
    return `<div class="wcard">
      <img class="wthumb" src="${RAW}/${w.photo}" onerror="this.style.display='none'">
      <div class="winfo">
        <div class="wid">${id}</div>
        <div class="wtitle">${w.title}</div>
        <div class="wmeta">${w.artist} · ${w.year} · ${w.owner}</div>
      </div>
      <div class="wact">
        <span class="badge ${w.public?'pub':'prv'}" id="b-${id}">${w.public?'PUBLIC':'PRIVATE'}</span>
        <div class="tog-row">
          <span class="tog-lbl">Public</span>
          <label class="tog">
            <input type="checkbox" ${w.public?'checked':''} onchange="toggle('${id}',this.checked)">
            <span class="tog-sl"></span>
          </label>
        </div>
        <a href="/${id}" target="_blank" class="wlink">↗ passport</a>
        <button class="btn-ton ${tonAnchored?'anchored':''}" onclick="anchorToTon('${id}')">${tonAnchored?'⬡ TON anchored':'⬡ Anchor to TON'}</button>
      </div>
    </div>`;
  }).join('') || '<div class="loading-txt">No works yet</div>';
}

async function toggle(id, val) {
  worksDb[id].public = val;
  const b = document.getElementById('b-' + id);
  b.textContent = val ? 'PUBLIC' : 'PRIVATE';
  b.className = 'badge ' + (val ? 'pub' : 'prv');
  await saveWorks('Update visibility: ' + id);
}

async function anchorToTon(id) {
  const w = worksDb[id];
  if (w.ton_tx) {
    window.open(w.ton_explorer || ('https://tonviewer.com/transaction/' + w.ton_tx), '_blank');
    return;
  }
  const comment = 'JadeKey:' + id;
  const tonLink = 'ton://transfer/' + TON_REGISTRY + '?amount=10000000&text=' + encodeURIComponent(comment);
  if (!confirm('Anchor "' + w.title + '" to TON blockchain?\n\nOpens TON wallet · 0.01 TON\nComment: ' + comment)) return;
  window.open(tonLink, '_blank');
  setTimeout(() => {
    const tx = prompt('Paste transaction hash from TON explorer\n(leave empty to cancel):');
    if (!tx || !tx.trim()) return;
    worksDb[id].ton_tx = tx.trim();
    worksDb[id].ton_anchored_at = new Date().toISOString().slice(0, 10);
    saveWorks('TON anchor: ' + id);
  }, 3000);
}

async function saveWorks(message) {
  const t = getToken();
  if (!t) { alert('GitHub token required'); return; }
  // Сохраняем весь db обратно (с clients и works)
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2))));
  const res = await fetch(GH_API, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content, sha })
  });
  const data = await res.json();
  if (data.content) {
    sha = data.content.sha;
    renderWorks();
    const m = document.getElementById('saved-msg');
    m.textContent = '✓ Saved';
    m.style.display = 'block';
    setTimeout(() => m.style.display = 'none', 3000);
  }
}

if (localStorage.getItem(SESSION_KEY)) enterPanel();
</script>
</body>
</html>
